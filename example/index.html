<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>leviar-novel — 기능 테스트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    }
    #wrapper {
      position: relative;
      width: 800px;
      height: 600px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hint {
      margin-top: 12px;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <canvas id="canvas" width="800" height="600"></canvas>
  </div>
  <div id="hint">클릭 또는 Enter / Space 키로 진행합니다</div>
  <script type="module" src="./bundle.js"></script>
</body>
</html>
