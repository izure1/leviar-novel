<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>leviar-novel — 기능 테스트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      overflow: hidden;
    }

    /* ── 배경 그라디언트 장식 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(80, 40, 160, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(30, 80, 200, 0.14) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── 타이틀 */
    #title-bar {
      position: relative;
      z-index: 1;
      margin-bottom: 14px;
      text-align: center;
    }

    #title-bar h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
    }

    /* ── 캔버스 래퍼 */
    #wrapper {
      position: relative;
      width: 800px;
      height: 450px;
      border-radius: 4px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.07),
        0 20px 60px rgba(0, 0, 0, 0.9),
        0 0 80px rgba(80, 40, 200, 0.15);
      z-index: 1;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── 컨트롤 패널 */
    #controls {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    #controls button {
      padding: 7px 18px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.65);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
      user-select: none;
    }

    #controls button:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.3);
      color: rgba(255, 255, 255, 0.9);
    }

    #controls button:active {
      transform: scale(0.96);
    }

    #controls button.active {
      background: rgba(200, 60, 60, 0.25);
      border-color: rgba(255, 100, 100, 0.5);
      color: #ff9090;
    }

    #hint {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      color: rgba(255, 255, 255, 0.2);
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    /* ── Toast 알림 */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 9px 22px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 9999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast-success {
      background: rgba(30, 180, 100, 0.92);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0, 180, 80, 0.35);
    }

    .toast-error {
      background: rgba(200, 50, 50, 0.92);
      color: #fff;
      box-shadow: 0 4px 20px rgba(200, 50, 50, 0.35);
    }

    .toast-info {
      background: rgba(50, 100, 200, 0.92);
      color: #fff;
      box-shadow: 0 4px 20px rgba(50, 100, 200, 0.35);
    }
  </style>
</head>

<body>

  <div id="title-bar">
    <h1>leviar-novel · feature test</h1>
  </div>

  <div id="wrapper">
    <canvas id="canvas" width="800" height="450"></canvas>
  </div>

  <div id="controls">
    <button id="btn-skip">⏩ Skip</button>
    <button id="btn-save">💾 Save</button>
    <button id="btn-load">📂 Load</button>
  </div>

  <div id="hint">클릭 또는 Enter / Space — 진행 &nbsp;|&nbsp; Skip — 빠른 감기 &nbsp;|&nbsp; Save / Load — 세이브 테스트</div>

  <div id="toast" class="toast"></div>

  <script type="module" src="./bundle.js"></script>
</body>

</html>
